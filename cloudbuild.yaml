steps:
  # Step 1: Run backend tests
  - name: "python:3.11-slim"
    id: "test-backend"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install -r backend/requirements.txt --quiet &&
        cd backend &&
        python -m pytest tests/ -v --tb=short || true

  # Step 2: Build backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/mirrat-backend:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/mirrat-backend:latest"
      - "./backend"
    waitFor:
      - "test-backend"

  # Step 3: Push backend image
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    args:
      - "push"
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/mirrat-backend"
    waitFor:
      - "build-backend"

  # Step 4: Deploy backend to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-backend"
    args:
      - "run"
      - "deploy"
      - "mirrat-backend"
      - "--image=gcr.io/$PROJECT_ID/mirrat-backend:$COMMIT_SHA"
      - "--region=asia-south1"
      - "--platform=managed"
      - "--session-affinity"
      - "--timeout=3600"
      - "--min-instances=1"
      - "--max-instances=1"
      - "--allow-unauthenticated"
      - "--set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY,SESSION_SUMMARY_DEPTH=$$SESSION_SUMMARY_DEPTH,IDLE_TIMEOUT_MINUTES=$$IDLE_TIMEOUT_MINUTES"
    secretEnv:
      - "GEMINI_API_KEY"
      - "SESSION_SUMMARY_DEPTH"
      - "IDLE_TIMEOUT_MINUTES"
    waitFor:
      - "push-backend"

  # Step 5: Deploy frontend to Firebase Hosting
  - name: "gcr.io/$PROJECT_ID/firebase"
    id: "deploy-frontend"
    args:
      - "deploy"
      - "--only"
      - "hosting"
      - "--project=$PROJECT_ID"
    dir: "frontend"
    waitFor:
      - "deploy-backend"

availableSecrets:
  secretManager:
    - versionName: "projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest"
      env: "GEMINI_API_KEY"
    - versionName: "projects/$PROJECT_ID/secrets/SESSION_SUMMARY_DEPTH/versions/latest"
      env: "SESSION_SUMMARY_DEPTH"
    - versionName: "projects/$PROJECT_ID/secrets/IDLE_TIMEOUT_MINUTES/versions/latest"
      env: "IDLE_TIMEOUT_MINUTES"

options:
  logging: CLOUD_LOGGING_ONLY
